<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

        extend: {

        display: none !important;

</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans transition-colors duration-300">

  <!-- NAVBAR -->
  <nav id="navbar" class="sticky top-0 z-50 w-full bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm print:hidden transition-colors duration-300">

      <div class="flex justify-between h-16">
        <div class="flex items-center cursor-pointer" onclick="navigateToHomeOrDashboard()">

          <!-- Perfil / Botão de Login -->

          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTEÚDO PRINCIPAL (RENDERIZADO DINAMICAMENTE) -->
  <main id="app-container" class="flex-grow">
    <!-- As visualizações serão injetadas aqui -->
  </main>

  <!-- RODAPÉ -->
  <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-6 text-center text-sm text-slate-500 dark:text-slate-400 print:hidden transition-colors duration-300">
    <p>© 2026 Pré Vestibular! — Todos os direitos reservados.</p>
  </footer>

  <script>
    // ==========================================
    // DATABASE DE QUESTÕES (ENEM 2017/2018)
    // ==========================================
    const examDatabase = [
      {
        id: '2017-ing-1',
        year: 2017,
        subject: 'Inglês',
        num: 1,
        text: `British Government to Recruit Teens as Next Generation of Spies\n\nIn the 50 years since the first James Bond movie created a lasting impression of a British secret agent, a completely different character is about to emerge. Britain's intelligence agencies are to recruit their next generation of cyber spies by harnessing the talents of the "Xbox generation". In an expansion of a pilot program, Foreign Secretary William Hague announced Thursday that up to 100 18-year-olds will be given the chance to train for a career in Britain's secret services. The move to recruit school-leavers marks a break with the past, when agencies mainly drew their staff from among university graduates.\n\n"Young people are the key to our country's future success, just as they were during the war", Hague said. "Today we are not at war, but I see evidence every day of deliberate, organized attacks against intellectual property and government networks in the United Kingdom."\n\nThe new recruitment program, called the Single Intelligence Account apprenticeship scheme will enable students with suitable qualifications in science, technology or engineering, to spend two years learning about communications, security and engineering through formal education, technical training and work placements.\n\nJeary, P. Disponível em: http://worldnews.nbcnews.com. Acesso em: 19 nov. 2012.\n\nSegundo informações veiculadas pelo NBC News, a geração digital já tem seu espaço conquistado nas agências britânicas de inteligência. O governo britânico decidiu que`,
        options: {
          A: "enfrentará a guerra vigente e deliberada contra a propriedade intelectual no Reino Unido.",
          B: "abandonará a política de contratação de universitários como agentes secretos.",
          C: "recrutará jovens jogadores de Xbox como ciberespiões das agências de inteligência.",
          D: "implantará um esquema de capacitação de adolescentes para atuarem como agentes secretos.",
          E: "anunciará os nomes dos jovens a serem contratados."
        },
        answer: 'D'
      },
      {
        id: '2017-ing-2',
        year: 2017,
        subject: 'Inglês',
        num: 2,
        hasImage: true,
        imageDesc: "Imagem de uma poça de óleo escura no chão com uma peça de metal (parafuso/porca) ao lado e o texto 'Take your car just anyplace for an oil change, and you may regret it down the road.'",
        text: `Take your car just anyplace for an oil change, and you may regret it down the road.\nReader's Digest, set. 1993.\n\nNesse texto publicitário são utilizados recursos verbais e não verbais para transmitir a mensagem. Ao associar os termos anyplace e regret à imagem do texto, constata-se que o tema da propaganda é a importância da`,
        options: {
          A: "preservação do meio ambiente.",
          B: "manutenção do motor.",
          C: "escolha da empresa certa.",
          D: "consistência do produto.",
          E: "conservação do carro."
        },
        answer: 'C'
      },
      {
        id: '2017-ing-3',
        year: 2017,
        subject: 'Inglês',
        num: 3,
        text: `Letters\nChildren and Guns\nPublished: May 7, 2013\n\nTo the Editor: Re "Girl's Death by Gunshot Is Rejected as Symbol" (new article, May 6):\nI find it abhorrent that the people of Burkesville, Ky., are not willing to learn a lesson from the tragic shooting of a 2-year-old girl by her 5-year-old brother. I am not judging their lifestyle of introducing guns to children at a young age, but I do feel that it's irresponsible not to practice basic safety with anything potentially lethal guns, knives, fire and so on. How can anyone justify leaving guns lying around, unlocked and possibly loaded, in a home with two young children? I wish the family of the victim comfort during this difficult time, but to dismiss this as a simple accident leaves open the potential for many more such "accidents" to occur. I hope this doesn't have to happen several more times for legislators to realize that something needs to be changed.\nEMILY LOUBATON\nBrooklyn, May 6, 2013\nDisponível em: www.nytimes.com. Acesso em: 10 maio 2013.\n\nNo que diz respeito à tragédia ocorrida em Burkesville, a autora da carta enviada ao The New York Times busca`,
        options: {
          A: "reconhecer o acidente noticiado como um fato isolado",
          B: "responsabilizar o irmão da vítima pelo incidente ocorrido",
          C: "apresentar versão diferente da notícia publicada pelo jornal",
          D: "expor sua indignação com a negligência de portadores de armas",
          E: "reforçar a necessidade de proibição do uso de armas por crianças"
        },
        answer: 'D'
      },
      {
        id: '2017-ing-4',
        year: 2017,
        subject: 'Inglês',
        num: 4,
        text: `One of the things that made an incredible impression on me in the film was Frida's comfort in and celebration of her own unique beauty. She didn't try to fit into conventional ideas or images about womanhood or what makes someone or something beautiful. Instead, she fully inhabited her own unique gifts, not particularly caring what other people thought. She was magnetic and beautiful in her own right. She painted for years, not to be a commercial success or to be discovered, but to express her own inner pain, joy, family, love and culture. She absolutely and resolutely was who she was. The trueness of her own unique vision and her ability to stand firmly in her own truth was what made her successful in the end.\n\nHUTZLER, L. Disponível em: www.etbscreenwriting.com. Acesso em: 6 maio 2013.\n\nA autora desse comentário sobre o filme Frida mostra-se impressionada com o fato de a pintora`,
        options: {
          A: "ter uma aparência exótica.",
          B: "vender bem a sua imagem.",
          C: "ter grande poder de sedução.",
          D: "assumir sua beleza singular.",
          E: "recriar-se por meio da pintura."
        },
        answer: 'D'
      },
      {
        id: '2017-ing-5',
        year: 2017,
        subject: 'Inglês',
        num: 5,
        text: `Israel Travel Guide\nIsrael has always been a standout destination. From the days of prophets to the modern day nomad this tiny slice of land on the eastern Mediteranean has long attracted visitors. While some arrive in the 'Holy Land' on a spiritual quest, many others are on cultural tours, beach holidays and eco-tourism trips. Weeding through Israel's convoluted history is both exhilarating and exhausting. There are crumbling temples, ruined cities, abandoned forts and hundreds of places associated with the Bible. And while a sense of adventure is required, most sites are safe and easily accessible. Most of all, Israel is about its incredible diverse population. Jews come from all over the world to live here, while about 20% of the population is Muslim. Politics are hard to get away from in Israel as everyone has an opinion on how to move the country forward - with a ready ear you're sure to hear opinions from every side of the political spectrum.\nDisponível em: www.worldtravelguide.net. Acesso em: 15 jun. 2012.\n\nAntes de viajar, turistas geralmente buscam informações sobre o local para onde pretendem ir. O trecho do guia de viagens de Israel`,
        options: {
          A: "descreve a história desse local para que turistas valorizem seus costumes milenares.",
          B: "informa hábitos religiosos para auxiliar turistas a entenderem as diferenças culturais.",
          C: "divulga os principais pontos turísticos para ajudar turistas a planejarem sua viagem.",
          D: "recomenda medidas de segurança para alertar turistas sobre possíveis riscos locais.",
          E: "apresenta aspectos gerais da cultura do país para continuar a atrair turistas estrangeiros."
        },
        answer: 'E'
      },
      {
        id: '2018-ing-6',
        year: 2018,
        subject: 'Inglês',
        num: 6,
        hasImage: true,
        imageDesc: "Cartum de dois adolescentes caminhando. Um diz para o outro sobre as expectativas de amadurecimento.",
        text: `"WHEN I WAS 5 EVERYONE TOLD ME TO BE A BIG BOY.\nWHEN I WAS 10 THEY TOLD ME I SHOULD BE MORE MATURE.\nNOW THEY SAY IT'S TIME TO START ACTING LIKE AN ADULT.\nAT THIS RATE, I'LL BE ELIGIBLE FOR SOCIAL SECURITY BEFORE I GRADUATE FROM HIGH SCHOOL!"\n\nGLASBERGEN, R. Disponível em: www.glasbergen.com. Acesso em: 3 jul. 2015 (adaptado).\n\nNo cartum, a crítica está no fato de a sociedade exigir do adolescente que`,
        options: {
          A: "se aposente prematuramente",
          B: "amadureça precocemente",
          C: "estude aplicadamente",
          D: "se forma rapidamente",
          E: "ouça atentamente"
        },
        answer: 'B'
      },
      {
        id: '2018-ing-7',
        year: 2018,
        subject: 'Inglês',
        num: 7,
        text: `Lava Mae: Creating Showers on Wheels for the Homeless\nSan Francisco, according to recent city numbers, has 4,300 people living on the streets. Among the many problems the homeless face is little or no access to showers. San Francisco only has about 16 to 20 shower stalls to accommodate them.\n\nBut Doniece Sandoval has made it her mission to change that. The 51-year-old former marketing executive started Lava Mae, a sort of showers on wheels, a new project that aims to turn decommissioned city buses into shower stations for the homeless. Each bus will have two shower stations and Sandoval expects that they'll be able to provide 2,000 showers a week.\n\nANDREANO, C. Dísponível em: abcnews.go.com. Acesso: 26 jun. 2015 (adaptado).\n\nA relação dos vocábulos shower, bus e homeless, no texto, refere-se a`,
        options: {
          A: "empregar moradores de rua em lava a jatos para ônibus.",
          B: "criar acesso a banhos gratuitos para moradores de rua",
          C: "comissionar sem-teto para dirigir os ônibus da cidade.",
          D: "exigir das autoridades que os ônibus municipais tenham banheiros.",
          E: "abrigar dois mil moradores de rua em ônibus que foram adaptados."
        },
        answer: 'B'
      },
      {
        id: '2018-ing-8',
        year: 2018,
        subject: 'Inglês',
        num: 8,
        text: `TEXTO I\nA Free World-class Education for Anyone Anywhere\nThe Khan Academy is an organization on a mission. We're a not-for-profit with the goal of changing education for the better by providing a free education to anyone anywhere. All of the site's resources are available to anyone. The Khan Academy's materials and resources are available to you completely free of charge.\nDisponível em: www.khanacademy.org. Acesso em: 24 fev. 2012 (adaptado).\n\nTEXTO II\nI didn't have a problem with Khan Academy Site until very recently. For me, the problem is the way Academy is being promoted. The way the media sees it as "revolutionizing education". The way people with power and money view education as simply "sit-and-get". If your philosophy of education is "sit-and-get", i.e., teaching is telling and learning is listening, then Khan Academy is way more efficient than classroom lecturing. Khan Academy does it better. But TRUE progressive educators, TRUE education visionaries and revolutionaries don't want to do these things better. We want to DO BETTER THINGS.\nDisponível em: http://fnoschese.wordpress.com. Acesso em: 2 mar. 2012.\n\nCom o impacto das tecnologias e a ampliação das redes sociais, consumidores encontram na internet possibilidades de opinar sobre serviços oferecidos. Nesse sentido, o segundo texto, que é um comentário sobre o site divulgado no primeiro, apresenta a intenção do autor de`,
        options: {
          A: "elogiar o trabalho proposto para a educação nessa era tecnológica.",
          B: "reforçar como a mídia pode contribuir para revolucionar a educação.",
          C: "chamar a atenção das pessoas influentes para o significado da educação.",
          D: "destacar que o site tem melhores resultados do que a educação tradicional.",
          E: "criticar a concepção de educação em que se baseia a organização."
        },
        answer: 'E'
      },
      {
        id: '2018-ing-9',
        year: 2018,
        subject: 'Inglês',
        num: 9,
        text: `Don't write in English, they said,\nEnglish is not your mother tongue...\n... The language I speak\nBecomes mine, its distortions, its queerness\nAll mine, mine alone, it is half English, half\nIndian, funny perhaps, but it is honest,\nIt is as human as I am human...\n...It voices my joys, my longings my\nHopes...\n(Kamala Das, 1965:10)\n\nGARGESH, R. South Asian Englishes. In: KACHRU, Y; NELSON, C. L. (Eds.). The Handbook of World English. Singapore: Blackwell, 2006\n\nA poetisa Kamala Das, como muitos escritores indianos. escreve suas obras em inglês, apesar de essa não ser sua primeira língua. Nesses versos, ela`,
        options: {
          A: "usa a língua inglesa como efeito humorístico.",
          B: "recorre a vozes de vários escritores ingleses.",
          C: "adverte sobre o uso distorcido da língua inglesa.",
          D: "demonstra consciência de sua identidade linguística.",
          E: "reconhece a incompreensão na sua maneira de falar inglês."
        },
        answer: 'D'
      },
      {
        id: '2018-ing-10',
        year: 2018,
        subject: 'Inglês',
        num: 10,
        text: `1984 (excerpt)\n'Is it your opinion, Winston, that the past has real existence?' [...] O'Brien smiled faintly. 'I will put it more precisely. Does the past exist concretely, in space? Is there somewhere or other a place, a world of solid objects, where the past is still happening?'\n'No.\n'Then where does the past exist, if at all?'\n'In records. It is written down.'\n'In records. And - -?'\n'In the mind. In human memories.'\n'In memory. Very well, then. We, the Party, control all records, and we control all memories. Then we control the past, do we not?'\nORWELL. G. Nineteen Eighty-Four. New York: Signet Classics, 1977\n\nO romance 1984 descreve os perigos de um Estado totalitário. A ideia evidenciada nessa passagem é que o controle do Estado se dá por meio do(a)`,
        options: {
          A: "boicote a ideais libertários.",
          B: "veto ao culto das tradições.",
          C: "poder sobre memórias e registros.",
          D: "censura a produções orais e escritas.",
          E: "manipulação de pensamentos individuais."
        },
        answer: 'C'
      }
    ];

    // ==========================================
    // ESTADO DA APLICAÇÃO
    // ==========================================
    let state = {
      user: null,
      view: 'home', // home, login, dashboard, exam-setup, exam-active, exam-report, history
      darkMode: false,
      history: [],
      activeExamParams: { year: null, subject: null },
      examQuestions: [],
      currentQuestionIndex: 0,
      userAnswers: {},
      timeSpent: 0,
      isExamRunning: false,
      currentReport: null
    };

    let timerInterval = null;
    let mainChartInstance = null; // Instância Chart.js global para o dashboard

    // ==========================================
    // HELPER FUNCTIONS
    // ==========================================
    const formatTime = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    };

    const formatDate = (dateString) => {
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
      return new Date(dateString).toLocaleDateString('pt-BR', options);
    };

    // ==========================================
    // CONTROLE DE NAVEGAÇÃO E RE-RENDERIZAÇÃO
    // ==========================================
    function setView(newView) {
      state.view = newView;
      render();
    }

    function navigateToHomeOrDashboard() {
      if (state.user) {
        setView('dashboard');
      } else {
        setView('home');
      }
    }

    // ==========================================
    // GERENCIAMENTO DO MODO ESCURO
    // ==========================================
    function toggleDarkMode() {
      state.darkMode = !state.darkMode;
      localStorage.setItem('preVest_theme', state.darkMode ? 'dark' : 'light');
      applyTheme();
    }

    function applyTheme() {
      const htmlElement = document.documentElement;
      const themeIcon = document.getElementById('theme-icon');
      
      if (state.darkMode) {
        htmlElement.classList.add('dark');
        document.body.classList.add('bg-slate-950');
        document.body.classList.remove('bg-slate-50');
        if (themeIcon) {
          themeIcon.setAttribute('data-lucide', 'sun');
        }
      } else {
        htmlElement.classList.remove('dark');
        document.body.classList.remove('bg-slate-950');
        document.body.classList.add('bg-slate-50');
        if (themeIcon) {
          themeIcon.setAttribute('data-lucide', 'moon');
        }
      }
      lucide.createIcons();
    }

    // ==========================================
    // INTERAÇÃO E LOGIN
    // ==========================================
    function handleLoginSubmit(event) {
      event.preventDefault();
      const name = document.getElementById('name-input').value;
      const grade = document.getElementById('grade-select').value;
      
      state.user = {
        name: name,
        grade: grade,
        id: Date.now().toString()
      };
      
      localStorage.setItem('preVest_user', JSON.stringify(state.user));
      setView('dashboard');
    }

    function handleLogout() {
      state.user = null;
      state.history = [];
      localStorage.removeItem('preVest_user');
      localStorage.removeItem('preVest_history');
      setView('home');
    }

    // ==========================================
    // CRIAÇÃO E CONTROLE DOS SIMULADOS
    // ==========================================
    function startExamSetup() {
      state.activeExamParams = { year: null, subject: null };
      setView('exam-setup');
    }

    function selectExamSetup(year, subject) {
      state.activeExamParams = { year, subject };
      
      // Procura se temos questões para essa configuração
      const availableQuestions = examDatabase.filter(q => q.year === year && q.subject === subject);
      if (availableQuestions.length > 0) {
        startExam(year, subject);
      } else {
        alert('Este simulado ainda não possui questões cadastradas.');
      }
    }

    function startExam(year, subject) {
      const questions = examDatabase.filter(q => q.year === year && q.subject === subject);
      state.examQuestions = questions;
      state.currentQuestionIndex = 0;
      state.userAnswers = {};
      state.timeSpent = 0;
      state.isExamRunning = true;
      
      // Inicia timer
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        state.timeSpent += 1;
        updateActiveExamTimer();
      }, 1000);

      setView('exam-active');
    }

    function updateActiveExamTimer() {
      const timerLabel = document.getElementById('active-timer');
      if (timerLabel) {
        timerLabel.innerText = formatTime(state.timeSpent);
      }
    }

    function handleAnswerSelect(option) {
      const currentQuestion = state.examQuestions[state.currentQuestionIndex];
      state.userAnswers[currentQuestion.id] = option;
      renderActiveExamQuestion();
    }

    function nextQuestion() {
      if (state.currentQuestionIndex < state.examQuestions.length - 1) {
        state.currentQuestionIndex++;
        renderActiveExamQuestion();
      }
    }

    function previousQuestion() {
      if (state.currentQuestionIndex > 0) {
        state.currentQuestionIndex--;
        renderActiveExamQuestion();
      }
    }

    function finishExam() {
      clearInterval(timerInterval);
      state.isExamRunning = false;
      
      let correctCount = 0;
      const correctQuestions = [];
      const incorrectQuestions = [];

      state.examQuestions.forEach(q => {
        const userAnswer = state.userAnswers[q.id];
        if (userAnswer === q.answer) {
          correctCount++;
          correctQuestions.push(q.num);
        } else {
          incorrectQuestions.push(q.num);
        }
      });

      const report = {
        id: Date.now().toString(),
        date: new Date().toISOString(),
        year: state.activeExamParams.year,
        subject: state.activeExamParams.subject,
        totalQuestions: state.examQuestions.length,
        answeredQuestions: Object.keys(state.userAnswers).length,
        correctCount,
        incorrectCount: state.examQuestions.length - correctCount,
        percentage: ((correctCount / state.examQuestions.length) * 100).toFixed(1),
        timeSpent: state.timeSpent,
        correctQuestions,
        incorrectQuestions,
        grade: Math.round((correctCount / state.examQuestions.length) * 1000) // Cálculo simulado de nota ENEM
      };

      state.currentReport = report;
      state.history.unshift(report);
      localStorage.setItem('preVest_history', JSON.stringify(state.history));
      
      setView('exam-report');
    }

    // ==========================================
    // RENDERIZADORES DE TELAS (VIEWS)
    // ==========================================
    
    // Navbar Dinâmica
    function renderNavbar() {
      const container = document.getElementById('user-menu-container');
      if (!state.user) {
        container.innerHTML = `
          ${state.view !== 'login' ? `
            <button onclick="setView('login')" class="flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-colors">
              Entrar
            </button>
          ` : ''}
        `;
      } else {
        container.innerHTML = `
          <div class="hidden sm:flex items-center text-sm font-medium text-slate-700 dark:text-slate-300">
            <i data-lucide="user" class="h-4 w-4 mr-1"></i>
            ${state.user.name.split(' ')[0]}
          </div>
          <button onclick="handleLogout()" class="flex items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md text-red-600 bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 dark:text-red-400 transition-colors">
            <i data-lucide="log-out" class="h-4 w-4 sm:mr-1"></i>
            <span class="hidden sm:inline">Sair</span>
          </button>
        `;
      }
      lucide.createIcons();
    }

    // 1. HOME VIEW
    function renderHomeView() {
      return `
        <div class="min-h-[calc(100vh-4rem)] flex flex-col items-center justify-center px-4 py-12">
          <div class="text-center max-w-3xl">
            <div class="h-24 w-24 mx-auto text-indigo-600 dark:text-indigo-400 mb-8 animate-bounce flex items-center justify-center">
              <i data-lucide="graduation-cap" class="h-20 w-20"></i>
            </div>
            <h1 class="text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4">
              Prepare-se para o <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400">ENEM</span>
            </h1>
            <p class="text-xl text-slate-600 dark:text-slate-300 mb-8">
              A plataforma mais completa de simulados. Teste seus conhecimentos, acompanhe seu desempenho e alcance a nota dos seus sonhos.
            </p>

    // 3. DASHBOARD VIEW
    function renderDashboardView() {
      const totalExams = state.history.length;
      const totalQuestions = state.history.reduce((acc, curr) => acc + curr.totalQuestions, 0);
      const totalCorrect = state.history.reduce((acc, curr) => acc + curr.correctCount, 0);

      // Monta as linhas do histórico recente do Dashboard
      let historyRowsHTML = '';
      if (state.history.length > 0) {
        state.history.slice(0, 3).forEach(item => {
          historyRowsHTML += `
            <div class="flex justify-between items-center p-3 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700">

              </div>
              <div class="text-right">
                <span class="text-sm font-bold text-emerald-600 dark:text-emerald-400">${item.correctCount}/${item.totalQuestions} acertos</span>
                <p class="text-xs text-slate-500 dark:text-slate-400">${item.percentage}%</p>
              </div>
            </div>

        });
      } else {
        historyRowsHTML = `
          <div class="flex-grow flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 py-12">

          </div>

      }

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-in fade-in duration-500">
          <div class="flex flex-col md:flex-row md:items-center justify-between mb-8">
            <div>
              <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Olá, ${state.user.name}!</h1>
              <p class="text-slate-600 dark:text-slate-400 mt-1">Bem-vindo(a) ao seu painel de desempenho (${state.user.grade}).</p>
            </div>
            <button
              onclick="startExamSetup()"
              class="mt-4 md:mt-0 flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg transition-all"

              <i data-lucide="play" class="mr-2 h-5 w-5"></i>
              Novo Simulado
            </button>
          </div>

          <!-- Grid de Estatísticas -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center space-x-4">
              <div class="h-12 w-12 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center">
                <i data-lucide="file-text" class="text-blue-500"></i>
              </div>
              <div>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Simulados Realizados</p>
                <p class="text-2xl font-bold text-slate-900 dark:text-white">${totalExams}</p>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center space-x-4">
              <div class="h-12 w-12 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center">
                <i data-lucide="book-open" class="text-purple-500"></i>
              </div>
              <div>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Questões Respondidas</p>
                <p class="text-2xl font-bold text-slate-900 dark:text-white">${totalQuestions}</p>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center space-x-4">
              <div class="h-12 w-12 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center">
                <i data-lucide="check-circle" class="text-emerald-500"></i>
              </div>
              <div>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Taxa de Acertos</p>
                <p class="text-2xl font-bold text-slate-900 dark:text-white">${accuracy}%</p>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex items-center space-x-4">
              <div class="h-12 w-12 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center">
                <i data-lucide="award" class="text-yellow-500"></i>
              </div>
              <div>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Desempenho Geral</p>
                <p class="text-2xl font-bold text-slate-900 dark:text-white">${totalExams === 0 ? '—' : accuracy > 70 ? 'Ótimo' : accuracy > 50 ? 'Bom' : 'A melhorar'}</p>
              </div>
            </div>
          </div>

          <!-- Seção de Evolução de Gráfico e Histórico Recente -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800">
              <h2 class="text-lg font-semibold text-slate-900 dark:text-white mb-4">Evolução Recente (Últimos 5)</h2>
              <div id="chart-container-div" class="h-72 flex flex-col justify-center">
                ${totalExams > 0 ? `
                  <canvas id="dashboard-evolution-chart" class="w-full h-full"></canvas>
                ` : `
                  <div class="flex-grow flex flex-col items-center justify-center text-slate-500 dark:text-slate-400">
                    <i data-lucide="bar-chart-2" class="h-12 w-12 mb-2 opacity-50"></i>
                    <p class="text-sm">Sem dados de evolução disponíveis. Faça seu primeiro simulado!</p>
                  </div>
                `}
              </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col">
              <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-slate-900 dark:text-white">Histórico Recente</h2>
                <button onclick="setView('history')" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">Ver todos</button>
              </div>
              <div class="space-y-4 flex-grow flex flex-col">
                ${historyRowsHTML}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Inicializa Gráfico do Dashboard
    function initDashboardChart() {
      const ctx = document.getElementById('dashboard-evolution-chart');
      if (!ctx || state.history.length === 0) return;

      const recentHistory = [...state.history].slice(0, 5).reverse();
      const labels = recentHistory.map((h, i) => `Simulado ${state.history.length - (recentHistory.length - 1 - i)}`);
      const dataCorrect = recentHistory.map(h => h.correctCount);
      const dataIncorrect = recentHistory.map(h => h.incorrectCount);

      if (mainChartInstance) {
        mainChartInstance.destroy();
      }

      mainChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Acertos',
              data: dataCorrect,
              backgroundColor: '#22c55e',
              borderRadius: 4
            },
            {
              label: 'Erros',
              data: dataIncorrect,
              backgroundColor: '#ef4444',
              borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: state.darkMode ? '#94a3b8' : '#475569'
              }
            }
          },
          scales: {
            x: {
              grid: {
                color: state.darkMode ? '#334155' : '#f1f5f9'
              },
              ticks: {
                color: state.darkMode ? '#94a3b8' : '#475569'
              }
            },
            y: {
              grid: {
                color: state.darkMode ? '#334155' : '#f1f5f9'
              },
              ticks: {
                color: state.darkMode ? '#94a3b8' : '#475569',
                stepSize: 1
              }
            }
          }
        }
      });
    }

        examsByYear[year].forEach(subject => {
          const count = examDatabase.filter(q => q.year == year && q.subject == subject).length;
          cardsHTML += `
            <div onclick="selectExamSetup(${year}, '${subject}')" class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 hover:border-indigo-500 dark:hover:border-indigo-400 cursor-pointer transition-all transform hover:-translate-y-1">
              <div class="flex items-start justify-between mb-4">
                <div class="h-12 w-12 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center text-indigo-600 dark:text-indigo-400">
                  <i data-lucide="book-open" class="h-6 w-6"></i>
                </div>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800 dark:bg-indigo-900/50 dark:text-indigo-300">
                  ENEM ${year}
                </span>
              </div>
              <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">${subject}</h3>

              <div class="flex items-center text-indigo-600 dark:text-indigo-400 font-medium">
                Começar Simulado <i data-lucide="chevron-right" class="ml-1 h-4 w-4"></i>

      });

      return `
        <div class="max-w-4xl mx-auto px-4 py-8 animate-in fade-in duration-500">
          <button onclick="setView('dashboard')" class="flex items-center text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white mb-6 transition-colors">
            <i data-lucide="chevron-right" class="h-4 w-4 rotate-180 mr-1"></i> Voltar ao Painel
          </button>
          <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Escolha um Simulado</h1>
            <p class="text-slate-600 dark:text-slate-400 mt-1">Selecione o ano e a matéria que deseja praticar hoje.</p>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            ${cardsHTML}
          </div>

      `;

    // 5. EXAM ACTIVE VIEW
    function renderExamActiveView() {
      return `
        <div class="max-w-4xl mx-auto px-4 py-8 animate-in fade-in duration-300">
          <!-- Header do Simulado Ativo -->
          <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl p-4 sm:p-6 mb-6 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
              <h2 class="text-xl font-bold text-slate-900 dark:text-white">${state.activeExamParams.subject} — ENEM ${state.activeExamParams.year}</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Respondendo à questão atual de forma cronometrada</p>
            </div>
            <div class="flex items-center space-x-4">
              <div class="flex items-center space-x-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 px-3.5 py-1.5 rounded-xl font-mono text-slate-700 dark:text-slate-300">
                <i data-lucide="clock" class="h-4 w-4 text-slate-500"></i>
                <span id="active-timer">${formatTime(state.timeSpent)}</span>
              </div>
              <button onclick="finishExam()" class="px-4 py-2 border border-transparent text-sm font-semibold rounded-xl text-white bg-red-600 hover:bg-red-700 shadow-sm transition-colors">
                Finalizar Simulado
              </button>
            </div>
          </div>

          <!-- Questão Injetada Dinamicamente -->
          <div id="active-question-container"></div>
        </div>
      `;
    }

    function renderActiveExamQuestion() {
      const q = state.examQuestions[state.currentQuestionIndex];
      const isFirst = state.currentQuestionIndex === 0;
      const isLast = state.currentQuestionIndex === state.examQuestions.length - 1;
      const progressPercent = ((state.currentQuestionIndex + 1) / state.examQuestions.length) * 100;

      // Montar Alternativas
      let optionsHTML = '';
      const selectedOption = state.userAnswers[q.id];

      Object.keys(q.options).forEach(optKey => {
        const optionValue = q.options[optKey];
        const isSelected = selectedOption === optKey;
        optionsHTML += `
          <button
            onclick="handleAnswerSelect('${optKey}')"
            class="w-full text-left p-4 rounded-xl border transition-all flex items-start space-x-3 group ${
              isSelected 
              ? 'border-indigo-600 bg-indigo-50/50 dark:border-indigo-400 dark:bg-indigo-900/30' 
              : 'border-slate-200 dark:border-slate-800 hover:border-indigo-300 dark:hover:border-indigo-700 hover:bg-slate-50 dark:hover:bg-slate-850'
            }"
          >
            <div class="h-6 w-6 rounded-full border-2 flex items-center justify-center font-bold text-sm shrink-0 transition-colors ${
              isSelected
              ? 'border-indigo-600 bg-indigo-600 text-white dark:border-indigo-400 dark:bg-indigo-400'
              : 'border-slate-300 dark:border-slate-600 group-hover:border-indigo-500 text-slate-500 dark:text-slate-400'
            }">
              ${optKey}
            </div>
            <span class="text-slate-700 dark:text-slate-300 text-sm sm:text-base">${optionValue}</span>
          </button>
        `;
      });

      // Seletor Superior de Bolinhas para Navegação Direta de Questão
      let pageBubblesHTML = '';
      state.examQuestions.forEach((eq, index) => {
        const isCurrent = index === state.currentQuestionIndex;
        const isAnswered = state.userAnswers[eq.id] !== undefined;
        pageBubblesHTML += `
          <button
            onclick="state.currentQuestionIndex = ${index}; renderActiveExamQuestion();"
            class="h-9 w-9 rounded-xl border flex items-center justify-center font-bold text-sm transition-all shrink-0 ${
              isCurrent
              ? 'bg-indigo-600 text-white border-indigo-600 dark:bg-indigo-400 dark:border-indigo-400'
              : isAnswered
              ? 'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700'
              : 'bg-white dark:bg-slate-900 text-slate-400 dark:text-slate-500 border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700'
            }"
          >
            ${index + 1}
          </button>
        `;
      });

      const container = document.getElementById('active-question-container');
      if (container) {
        container.innerHTML = `
          <!-- Linha de Progresso e Navegador Rápido -->
          <div class="mb-6">
            <div class="flex items-center justify-between mb-3 text-sm font-semibold text-slate-500 dark:text-slate-400">
              <span>Questão ${state.currentQuestionIndex + 1} de ${state.examQuestions.length}</span>
              <span>${Math.round(progressPercent)}% Concluído</span>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
              <div class="bg-indigo-600 dark:bg-indigo-400 h-full transition-all duration-300" style="width: ${progressPercent}%"></div>
            </div>
            <div class="flex items-center space-x-2 overflow-x-auto pb-2 scrollbar-none">
              ${pageBubblesHTML}
            </div>
          </div>

          <!-- Card da Questão -->
          <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl p-6 sm:p-8 shadow-sm">
            <!-- Caso a questão tenha uma descrição de imagem -->
            ${q.hasImage ? `
              <div class="mb-6 p-4 rounded-xl border border-dashed border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/30 flex items-center space-x-3 text-slate-600 dark:text-slate-400">
                <i data-lucide="file-text" class="h-6 w-6 shrink-0"></i>
                <div class="text-sm">
                  <span class="font-bold">[Aviso de Imagem]:</span> ${q.imageDesc}
                </div>
              </div>
            ` : ''}

            <!-- Texto Principal da Questão -->
            <div class="prose dark:prose-invert max-w-none text-slate-800 dark:text-slate-200 text-base leading-relaxed whitespace-pre-line mb-8">
              ${q.text}
            </div>

            <!-- Alternativas de Resposta -->
            <div class="space-y-3 mb-8">
              ${optionsHTML}
            </div>

            <!-- Ações de Navegação de Questões -->
            <div class="flex justify-between items-center pt-6 border-t border-slate-100 dark:border-slate-800">
              <button
                onclick="previousQuestion()"
                ${isFirst ? 'disabled' : ''}
                class="flex items-center px-4 py-2 text-sm font-medium rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
              >
                <i data-lucide="chevron-right" class="rotate-180 h-4 w-4 mr-1.5"></i> Voltar
              </button>

              ${isLast ? `
                <button
                  onclick="finishExam()"
                  class="flex items-center px-5 py-2.5 text-sm font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-colors"
                >
                  Finalizar Simulado
                </button>
              ` : `
                <button
                  onclick="nextQuestion()"
                  class="flex items-center px-4 py-2 text-sm font-medium rounded-lg border border-transparent bg-slate-900 hover:bg-slate-800 dark:bg-slate-100 dark:hover:bg-white text-white dark:text-slate-950 transition-colors"
                >
                  Próxima <i data-lucide="chevron-right" class="h-4 w-4 ml-1.5"></i>
                </button>
              `}
            </div>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // 6. EXAM REPORT VIEW (RELATÓRIO)
    function renderExamReportView() {
      const rep = state.currentReport;
      if (!rep) return '';

      // Monta a revisão detalhada de acertos e erros nas questões
      let questionReviewsHTML = '';
      const questionsFiltered = examDatabase.filter(q => q.year === rep.year && q.subject === rep.subject);

      questionsFiltered.forEach((q, index) => {
        const userAnswer = state.userAnswers[q.id] || "Não respondida";
        const isCorrect = userAnswer === q.answer;

        questionReviewsHTML += `
          <div class="border-b border-slate-100 dark:border-slate-800 pb-6 mb-6 last:border-b-0 last:pb-0 last:mb-0">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm font-bold text-slate-500 dark:text-slate-400">Questão ${index + 1} (ENEM ${rep.year})</span>
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${
                isCorrect 
                ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/50 dark:text-emerald-300' 
                : 'bg-red-100 text-red-800 dark:bg-red-900/50 dark:text-red-300'
              }">
                <i data-lucide="${isCorrect ? 'check-circle' : 'x-circle'}" class="h-3 w-3 mr-1"></i>
                ${isCorrect ? 'Acertou' : 'Errou'}
              </span>
            </div>
            
            <p class="text-slate-800 dark:text-slate-200 text-sm whitespace-pre-line leading-relaxed mb-4">${q.text}</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
              <div class="p-3 rounded-lg bg-emerald-55/40 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-900/30 text-slate-700 dark:text-slate-300">
                <span class="font-bold text-emerald-600 dark:text-emerald-400">Gabarito Oficial:</span> ${q.answer}) ${q.options[q.answer]}
              </div>
              <div class="p-3 rounded-lg ${
                isCorrect 
                ? 'bg-emerald-55/40 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-900/30 text-slate-700 dark:text-slate-300' 
                : 'bg-red-50/50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30 text-slate-700 dark:text-slate-300'
              }">
                <span class="font-bold ${isCorrect ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400'}">Sua Resposta:</span> 
                ${userAnswer !== 'Não respondida' ? `${userAnswer}) ${q.options[userAnswer]}` : 'Não respondida'}
              </div>
            </div>
          </div>
        `;
      });

      return `
        <div class="max-w-4xl mx-auto px-4 py-8 animate-in fade-in duration-500">
          <!-- Ações de Impressão e Voltar -->
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 print:hidden gap-4">
            <button onclick="setView('dashboard')" class="flex items-center text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
              <i data-lucide="chevron-right" class="rotate-180 h-4 w-4 mr-1.5"></i> Voltar ao Painel
            </button>
            <button onclick="window.print()" class="flex items-center px-4 py-2 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold rounded-lg transition-colors shadow-sm">
              <i data-lucide="download" class="h-4 w-4 mr-1.5"></i> Baixar Relatório (PDF / Imprimir)
            </button>
          </div>

          <!-- Card de Resumo Principal -->
          <div class="bg-gradient-to-br from-indigo-900 to-slate-900 dark:from-slate-900 dark:to-slate-950 text-white rounded-3xl p-6 sm:p-8 shadow-xl mb-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
              <div>
                <span class="px-3 py-1 rounded-full text-xs font-semibold bg-indigo-500/25 border border-indigo-400/20 text-indigo-200">Simulado Concluído</span>
                <h1 class="text-3xl font-extrabold mt-3">${rep.subject} — ENEM ${rep.year}</h1>
                <p class="text-indigo-200 text-sm mt-1">Realizado por ${state.user.name} em ${formatDate(rep.date)}</p>
              </div>
              <div class="bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl p-4 text-center shrink-0 w-full md:w-auto">
                <p class="text-xs text-indigo-200 uppercase tracking-wider font-bold">Nota ENEM Aproximada</p>
                <p class="text-5xl font-black text-white mt-1">${rep.grade}</p>
                <p class="text-xxs text-indigo-300 mt-1">Escala aproximada baseada no ENEM</p>
              </div>
            </div>

            <!-- Dados Estatísticos de Acertos -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-8 pt-6 border-t border-white/10 text-center">
              <div>
                <p class="text-indigo-200 text-xs">Taxa de Acerto</p>
                <p class="text-2xl font-bold mt-1">${rep.percentage}%</p>
              </div>
              <div>
                <p class="text-indigo-200 text-xs">Acertos / Questões</p>
                <p class="text-2xl font-bold mt-1 text-emerald-400">${rep.correctCount} / ${rep.totalQuestions}</p>
              </div>
              <div>
                <p class="text-indigo-200 text-xs">Tempo de Resolução</p>
                <p class="text-2xl font-bold mt-1">${formatTime(rep.timeSpent)}</p>
              </div>
              <div>
                <p class="text-indigo-200 text-xs">Respondidas</p>
                <p class="text-2xl font-bold mt-1">${rep.answeredQuestions} / ${rep.totalQuestions}</p>
              </div>
            </div>
          </div>

          <!-- Histórico de Questões Erro vs Acerto -->
          <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-6 sm:p-8 shadow-sm">
            <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-6 flex items-center">
              <i data-lucide="file-text" class="h-5 w-5 text-indigo-500 mr-2"></i> Revisão de Questões
            </h2>
            <div class="space-y-6">
              ${questionReviewsHTML}
            </div>
          </div>
        </div>
      `;
    }

    // 7. COMPLETE HISTORY VIEW
    function renderHistoryView() {
      let rowsHTML = '';
      if (state.history.length > 0) {
        state.history.forEach(item => {
          rowsHTML += `
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
              <div>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-50 dark:bg-indigo-950/40 text-indigo-700 dark:text-indigo-300 mb-2">
                  ENEM ${item.year} — ${item.subject}
                </span>
                <h3 class="text-lg font-bold text-slate-900 dark:text-white">${item.subject}</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">${formatDate(item.date)} • Duração: ${formatTime(item.timeSpent)}</p>
              </div>
              
              <div class="flex items-center space-x-6 w-full sm:w-auto justify-between sm:justify-end">
                <div class="text-left sm:text-right">
                  <p class="text-sm text-slate-500 dark:text-slate-400">Pontuação aproximada</p>
                  <p class="text-2xl font-black text-indigo-600 dark:text-indigo-400">${item.grade}</p>
                </div>
                <div class="text-left sm:text-right">
                  <p class="text-sm text-slate-500 dark:text-slate-400">Acertos</p>
                  <p class="text-lg font-bold text-emerald-600 dark:text-emerald-400">${item.correctCount}/${item.totalQuestions} (${item.percentage}%)</p>
                </div>
                <button
                  onclick="showSpecificReport('${item.id}')"
                  class="p-2 bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-500 hover:text-slate-900 dark:hover:text-white transition-all"
                >
                  <i data-lucide="chevron-right" class="h-5 w-5"></i>
                </button>
              </div>
            </div>
          `;
        });
      } else {
        rowsHTML = `
          <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 p-12 text-center text-slate-500 dark:text-slate-400">
            <i data-lucide="clock" class="h-12 w-12 mx-auto mb-3 opacity-40 text-indigo-500"></i>
            <h3 class="text-lg font-bold">Nenhum simulado histórico</h3>
            <p class="text-sm mt-1">Conclua seu primeiro teste de vestibular para registrar estatísticas.</p>
          </div>
        `;
      }

      return `
        <div class="max-w-4xl mx-auto px-4 py-8 animate-in fade-in duration-500">
          <button onclick="setView('dashboard')" class="flex items-center text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white mb-6 transition-colors">
            <i data-lucide="chevron-right" class="rotate-180 h-4 w-4 mr-1.5"></i> Voltar ao Painel
          </button>
          
          <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Seu Histórico Completo</h1>
            <p class="text-slate-600 dark:text-slate-400 mt-1">Acompanhe todos os seus simulados realizados ao longo da sua preparação.</p>
          </div>

          <div class="space-y-4">
            ${rowsHTML}
          </div>
        </div>
      `;
    }

    function showSpecificReport(reportId) {
      const selected = state.history.find(h => h.id === reportId);
      if (selected) {
        state.currentReport = selected;
        setView('exam-report');
      }
    }

    // ==========================================
    // CICLO DE VIDA E INICIALIZAÇÃO DA APLICAÇÃO
    // ==========================================
    function render() {
      renderNavbar();
      const container = document.getElementById('app-container');
      
      switch (state.view) {
        case 'home':
          container.innerHTML = renderHomeView();
          break;
        case 'login':
          container.innerHTML = renderLoginView();
          break;
        case 'dashboard':
          container.innerHTML = renderDashboardView();
          // Gráficos precisam ser instanciados após a injeção do HTML no DOM
          setTimeout(initDashboardChart, 50);
          break;
        case 'exam-setup':
          container.innerHTML = renderExamSetupView();
          break;
        case 'exam-active':
          container.innerHTML = renderExamActiveView();
          renderActiveExamQuestion();
          break;
        case 'exam-report':
          container.innerHTML = renderExamReportView();
          break;
        case 'history':
          container.innerHTML = renderHistoryView();
          break;
      }
      lucide.createIcons();
    }

    // Ao carregar a página
    window.onload = function() {
      // Carregar dados salvos no LocalStorage
      const savedUser = localStorage.getItem('preVest_user');
      const savedHistory = localStorage.getItem('preVest_history');
      const savedTheme = localStorage.getItem('preVest_theme');

      if (savedUser) {
        state.user = JSON.parse(savedUser);
        state.view = 'dashboard';
      }
      if (savedHistory) {
        state.history = JSON.parse(savedHistory);
      }
      if (savedTheme === 'dark') {
        state.darkMode = true;
      } else {
        state.darkMode = false;
      }

      applyTheme();
      render();
    };
  </script>
</body>
</html>
